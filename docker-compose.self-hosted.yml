services:
  postgres:
    image: postgres:16-alpine
    container_name: miaoda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: miaoda
      POSTGRES_USER: miaoda
      POSTGRES_PASSWORD: change-me
    volumes:
      - ./deploy/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./server
    container_name: miaoda-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
